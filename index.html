<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTigranmods</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-[#1b1b1b] p-8 rounded-2xl border border-[#00ff9c]/20 w-96">
            <h1 class="text-3xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-[#00ff9c] to-[#00eaff] mb-6">
                YourTigranmods
            </h1>
            <form onsubmit="event.preventDefault(); alert('Логин: ' + document.getElementById('email').value)">
                <div class="mb-4">
                    <input type="email" id="email" placeholder="Email" class="w-full bg-[#0f0f0f] border border-[#00ff9c]/20 rounded-lg px-4 py-3 text-white" required>
                </div>
                <div class="mb-4">
                    <input type="password" id="password" placeholder="Password" class="w-full bg-[#0f0f0f] border border-[#00ff9c]/20 rounded-lg px-4 py-3 text-white" required>
                </div>
                <button type="submit" class="w-full bg-[#00ff9c] text-[#0f0f0f] font-bold py-3 rounded-lg hover:bg-[#00eaff]">
                    Войти
                </button>
            </form>
        </div>
    </div>
</body>
</html>
