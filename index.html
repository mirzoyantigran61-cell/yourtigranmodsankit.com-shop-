<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTigranmods — Advanced Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Poppins', sans-serif; }
        
        /* Neon glow animation */
        .glow {
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px #00ff9c, 0 0 20px #00ff9c; }
            to { box-shadow: 0 0 20px #00eaff, 0 0 40px #00eaff; }
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1b1b1b; }
        ::-webkit-scrollbar-thumb { background: #00ff9c; border-radius: 4px; }
        
        /* Sidebar transition */
        .sidebar-transition {
            transition: all 0.3s ease;
        }
        
        /* Card hover effect */
        .dashboard-card {
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 156, 0.2);
        }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white overflow-x-hidden">

<!-- Главный контейнер -->
<div id="app"></div>

<script>
    // ========== КОНФИГУРАЦИЯ ==========
    const API_URL = "https://yourtigranmods-api-4.mirzoyantigran6.repl.co";
    const SITE_NAME = "YourTigranmods";
    
    // ========== СОСТОЯНИЕ ==========
    let currentUser = null;
    let currentPage = 'login';
    let sidebarCollapsed = false;
    
    // ========== МОК-ДАННЫЕ ДЛЯ ДЕМОНСТРАЦИИ ==========
    const mockLicenses = [
        { id: 'LIC-001', key: 'SPEED-2024-X9K2', status: 'active', created: '2024-01-15', expires: '2024-02-15' },
        { id: 'LIC-002', key: 'VIP-2024-ALPHA', status: 'active', created: '2024-01-20', expires: '2024-02-20' },
        { id: 'LIC-003', key: 'AIM-2024-BETA', status: 'expired', created: '2023-12-01', expires: '2024-01-01' },
    ];
    
    const mockUsers = [
        { id: 1, username: 'tigran', email: 'mirzoyantigran61@gmail.com', role: 'owner', status: 'active', joined: '2024-01-01' },
        { id: 2, username: 'ankit', email: 'ankit@example.com', role: 'admin', status: 'active', joined: '2024-01-05' },
        { id: 3, username: 'kaier', email: 'kaier@example.com', role: 'moderator', status: 'active', joined: '2024-01-10' },
        { id: 4, username: 'user123', email: 'user@example.com', role: 'user', status: 'suspended', joined: '2024-01-15' },
    ];
    
    // ========== ФУНКЦИИ API ==========
    async function apiRequest(endpoint, method = 'GET', body = null) {
        const options = {
            method,
            headers: { 'Content-Type': 'application/json' },
        };
        if (body) options.body = JSON.stringify(body);

        try {
            const response = await fetch(`${API_URL}${endpoint}`, options);
            return await response.json();
        } catch (error) {
            console.error('API Error:', error);
            return { success: false, error: 'Connection failed' };
        }
    }
    
    // ========== АВТОРИЗАЦИЯ ==========
    async function handleLogin(email, password) {
        const result = await apiRequest('/api/login', 'POST', { email, password });
        if (result.success) {
            currentUser = result.user;
            localStorage.setItem('token', result.token || 'demo-token');
            localStorage.setItem('user', JSON.stringify(result.user));
            navigateTo('dashboard');
        } else {
            alert(result.error || 'Login failed');
        }
    }
    
    async function handleRegister(userData) {
        const result = await apiRequest('/api/register', 'POST', userData);
        if (result.success) {
            alert('Registration successful! Please login.');
            navigateTo('login');
        } else {
            alert(result.error || 'Registration failed');
        }
    }
    
    function handleLogout() {
        localStorage.removeItem('user');
        localStorage.removeItem('token');
        currentUser = null;
        navigateTo('login');
    }
    
    // ========== НАВИГАЦИЯ ==========
    function navigateTo(page) {
        currentPage = page;
        render();
    }
    
    // ========== ПРОВЕРКА ПРАВ ==========
    function isOwner() {
        return currentUser?.role === 'owner';
    }
    
    function isAdmin() {
        return currentUser?.role === 'admin' || currentUser?.role === 'owner';
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    (function init() {
        const savedUser = localStorage.getItem('user');
        const token = localStorage.getItem('token');
        if (savedUser && token) {
            currentUser = JSON.parse(savedUser);
            currentPage = 'dashboard';
        }
        render();
    })();
    
    // ========== СИДЕБАР ==========
    function renderSidebar() {
        if (!currentUser) return '';
        
        const menuItems = [
            { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard' },
            { id: 'keys', icon: 'fa-key', label: 'Key Manager' },
            { id: 'downloads', icon: 'fa-download', label: 'Downloads' },
            { id: 'settings', icon: 'fa-user-cog', label: 'Settings' },
            { id: 'security', icon: 'fa-shield-alt', label: 'Security' },
            { id: 'support', icon: 'fa-headset', label: 'Support' },
        ];
        
        if (isAdmin()) {
            menuItems.push({ id: 'admin', icon: 'fa-crown', label: 'Admin Panel' });
        }
        
        return `
            <div class="fixed left-0 top-0 h-full bg-[#1b1b1b] border-r border-[#00ff9c]/20 p-4 transition-all duration-300 ${sidebarCollapsed ? 'w-20' : 'w-64'}">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-[#00ff9c] to-[#00eaff] ${sidebarCollapsed ? 'text-lg' : 'text-xl'}">
                        ${sidebarCollapsed ? 'YT' : SITE_NAME}
                    </h2>
                    <button onclick="toggleSidebar()" class="text-[#b5b5b5] hover:text-[#00ff9c]">
                        <i class="fas ${sidebarCollapsed ? 'fa-chevron-right' : 'fa-chevron-left'}"></i>
                    </button>
                </div>
                
                <div class="space-y-2">
                    ${menuItems.map(item => `
                        <button onclick="navigateTo('${item.id}')" 
                            class="w-full flex items-center ${sidebarCollapsed ? 'justify-center' : 'space-x-3'} px-4 py-3 rounded-lg transition-all
                            ${currentPage === item.id ? 'bg-[#00ff9c]/20 border border-[#00ff9c]' : 'hover:bg-[#00ff9c]/10'}"
                        >
                            <i class="fas ${item.icon} text-[#00ff9c] text-xl"></i>
                            ${!sidebarCollapsed ? `<span>${item.label}</span>` : ''}
                        </button>
                    `).join('')}
                </div>
                
                <div class="absolute bottom-4 left-4 right-4">
                    <button onclick="handleLogout()" 
                        class="w-full flex items-center ${sidebarCollapsed ? 'justify-center' : 'space-x-3'} px-4 py-3 rounded-lg hover:bg-red-500/10 text-red-500 border border-red-500/20"
                    >
                        <i class="fas fa-sign-out-alt text-xl"></i>
                        ${!sidebarCollapsed ? '<span>Logout</span>' : ''}
                    </button>
                </div>
            </div>
        `;
    }
    
    function toggleSidebar() {
        sidebarCollapsed = !sidebarCollapsed;
        render();
    }
    
    // ========== СТРАНИЦЫ ==========
    const pages = {
        login: () => `
            <div class="min-h-screen flex items-center justify-center p-4">
                <div class="w-full max-w-md">
                    <div class="bg-[#1b1b1b] rounded-2xl p-8 border border-[#00ff9c]/20 glow">

                            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-[#00ff9c] to-[#00eaff]">

                            </h1>
                            <p class="text-[#b5b5b5] mt-2">Sign in to your dashboard</p>
                        </div>
                        <form onsubmit="event.preventDefault(); handleLogin(
                            document.getElementById('loginEmail').value,
                            document.getElementById('loginPassword').value

                            <div>
                                <label class="block text-white mb-2">Email</label>
                                <input type="email" id="loginEmail" class="w-full bg-[#0f0f0f] border border-[#00ff9c]/20 rounded-lg px-4 py-3 text-white focus:border-[#00ff9c] focus:outline-none" required>
                            </div>
                            <div>
                                <label class="block text-white mb-2">Password</label>
                                <input type="password" id="loginPassword" class="w-full bg-[#0f0f0f] border border-[#00ff9c]/20 rounded-lg px-4 py-3 text-white focus:border-[#00ff9c] focus:outline-none" required>
                            </div>
                            <div class="flex items-center justify-between">
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" class="w-4 h-4 bg-[#0f0f0f] border border-[#00ff9c]/20 rounded accent-[#00ff9c]">
                                    <span class="text-[#b5b5b5]">Remember me</span>
                                </label>
                                <a href="#" onclick="navigateTo('forgot')" class="text-[#00ff9c] hover:text-[#00eaff]">Forgot password?</a>
                            </div>
                            <button type="submit" class="w-full bg-[#00ff9c] text-[#0f0f0f] font-bold py-3 rounded-lg hover:bg-[#00eaff] transition-all transform hover:scale-105">
                                Sign In

                            Don't have an account?

                        </p>
                    </div>
                </div>
            </div>
        `,
        
        register: () => `

                            </div>
                            <div>
                                <label class="block text-white mb-2">Email *</label>

                            </div>
                            <div>
                                <label class="block text-white mb-2">Telegram ID (optional)</label>

                            <div>

                            <div>

                            <div>
                                <label class="block text-white mb-2">Referral Code (optional)</label>
                                <input type="text" id="regReferral" class="w-full bg-[#0f0f0f] border border-[#00ff9c]/20 rounded-lg px-4 py-3 text-white focus:border-[#00ff9c] focus:outline-none">
                            </div>
                            <button type="submit" class="w-full bg-[#00ff9c] text-[#0f0f0f] font-bold py-3 rounded-lg hover:bg-[#00eaff] transition-all transform hover:scale-105 mt-6">
                                Create Account
                            </button>
                        </form>
                        <p class="text-center mt-6 text-[#b5b5b5]">
                            Already have an account? 
                            <a href="#" onclick="navigateTo('login')" class="text-[#00ff9c] hover:text-[#00eaff]">Sign in</a>
                        </p>
                    </div>
                </div>
            </div>
        `,
        
        forgot: () => `
            <div class="min-h-screen flex items-center justify-center p-4">
                <div class="w-full max-w-md">
                    <div class="bg-[#1b1b1b] rounded-2xl p-8 border border-[#00ff9c]/20">
                        <h2 class="text-2xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-[#00ff9c] to-[#00eaff] mb-6">Reset Password</h2>
                        <form onsubmit="event.preventDefault(); alert('Reset link sent to ' + document.getElementById('forgotEmail').value); navigateTo('login')" class="space-y-4">
                            <input type="email" id="forgotEmail" placeholder="Enter your email" class="w-full bg-[#0f0f0f] border border-[#00ff9c]/20 rounded-lg px-4 py-3 text-white focus:border-[#00ff9c] focus:outline-none" required>
                            <button type="submit" class="w-full bg-[#00ff9c] text-[#0f0f0f] font-bold py-3 rounded-lg hover:bg-[#00eaff]">Send Reset Link</button>
                        </form>

                        </p>

            </div>
        `,
        
        dashboard: () => `
            <div class="min-h-screen bg-[#0f0f0f] ${sidebarCollapsed ? 'pl-20' : 'pl-64'} transition-all duration-300">
                ${renderSidebar()}
                <div class="p-8">

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">

                            </div>

                        <div class="bg-[#1b1b1b] p-6 rounded-xl border border-[#00ff9c]/20 dashboard-card">

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
