<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - YourTigranmods</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0f0f0f] text-white">

<div class="min-h-screen bg-[#0f0f0f]">
    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 h-full w-64 bg-[#1b1b1b] border-r border-[#00ff9c]/20">
        <div class="p-4">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-[#00ff9c] to-[#00eaff]">
                    YTM
                </h2>
            </div>
            <nav class="space-y-2">
                <a href="dashboard.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg text-[#00ff9c] bg-[#00ff9c]/10">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="keys.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg text-[#b5b5b5] hover:text-[#00ff9c]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
                    <span>Keys / Licenses</span>
                </a>
                <a href="#" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg text-[#b5b5b5] hover:text-[#00ff9c]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    <span>Downloads</span>
                </a>
                <a href="settings.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg text-[#b5b5b5] hover:text-[#00ff9c]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    <span>Settings</span>
                </a>
                <a href="security.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg text-[#b5b5b5] hover:text-[#00ff9c]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                    <span>Security</span>
                </a>
                <a href="support.html" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg text-[#b5b5b5] hover:text-[#00ff9c]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span>Support</span>
                </a>
            </nav>
            <button onclick="logout()" class="sidebar-item flex items-center space-x-3 p-3 rounded-lg text-[#b5b5b5] hover:text-red-500 w-full mt-8">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main content -->
    <main class="ml-64">
        <!-- Top bar -->
        <div class="bg-[#1b1b1b] border-b border-[#00ff9c]/20 p-4">
            <div class="flex justify-end items-center">
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <p class="text-white" id="userName">Loading...</p>
                        <p class="text-[#b5b5b5] text-sm" id="userRole">Loading...</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-[#00ff9c]/20 flex items-center justify-center">
                        <span class="text-[#00ff9c] font-bold" id="userInitials">...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard content -->
        <div class="p-6">
            <h1 class="text-2xl font-bold text-white mb-6">Dashboard Overview</h1>
            
            <!-- Stats cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="bg-[#1b1b1b] rounded-xl p-6 border border-[#00ff9c]/20">
                    <p class="text-[#b5b5b5] text-sm">Active Licenses</p>
                    <p class="text-3xl font-bold text-[#00ff9c] mt-2" id="activeLicenses">0</p>
                </div>
                <div class="bg-[#1b1b1b] rounded-xl p-6 border border-[#00ff9c]/20">
                    <p class="text-[#b5b5b5] text-sm">Total Downloads</p>
                    <p class="text-3xl font-bold text-[#00eaff] mt-2" id="totalDownloads">0</p>
                </div>
                <div class="bg-[#1b1b1b] rounded-xl p-6 border border-[#00ff9c]/20">
                    <p class="text-[#b5b5b5] text-sm">Account Status</p>
                    <p class="text-3xl font-bold text-[#00ff9c] mt-2" id="accountStatus">Active</p>
                </div>
                <div class="bg-[#1b1b1b] rounded-xl p-6 border border-[#00ff9c]/20">
                    <p class="text-[#b5b5b5] text-sm">Member Since</p>
                    <p class="text-3xl font-bold text-[#00eaff] mt-2" id="memberSince">2024</p>
                </div>
            </div>

            <!-- Recent activity -->
            <div class="bg-[#1b1b1b] rounded-xl p-6 border border-[#00ff9c]/20">
                <h2 class="text-xl font-bold text-white mb-4">Recent Activity</h2>
                <div class="space-y-4" id="activityList">
                    <div class="text-[#b5b5b5] text-center py-4">Loading activities...</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
</body>
</html>
